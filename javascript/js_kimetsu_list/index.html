<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
<body>
    <header class="d-flex justify-content-center py-3 text-bg-dark">
        <h1>鬼滅の刃API</h1>
    </header>

    <div class="container p-4 mt-5 position-relative">
        <div class="btn-group position-absolute top-50 start-50 translate-middle" role="group" aria-label="Basic radio toggle button group">
            <input type="radio" class="btn-check" name="btnradio" id="btnradio1" value="all" autocomplete="off" checked>
            <label class="btn btn-outline-primary ps-4 pe-4" for="btnradio1">全キャラ</label>

            <input type="radio" class="btn-check" name="btnradio" id="btnradio2" value="kisatsutai" autocomplete="off">
            <label class="btn btn-outline-primary ps-4 pe-4" for="btnradio2">鬼滅隊</label>

            <input type="radio" class="btn-check" name="btnradio" id="btnradio3" value="hashira" autocomplete="off">
            <label class="btn btn-outline-primary ps-4 pe-4" for="btnradio3">柱</label>

            <input type="radio" class="btn-check" name="btnradio" id="btnradio4" value="oni" autocomplete="off">
            <label class="btn btn-outline-primary ps-4 pe-4" for="btnradio4">鬼</label>
        </div>
    </div>

    <div id="loading" class="loading hidden">
        <div class="container">
            <div class="sppiner">
                Now Loading...
            </div>
            <p class="placeholder-glow">
                <span class="placeholder col-12"></span>
            </p>
        </div>
    </div>

    <div id ="character" class="container p-4 mt-5 position-relative">
        <ul id="list" class="d-flex p-0 flex-wrap"></ul>
    </div>

    <script type="module" src="./scripts/get.js"></script>
    <script type="module" src="./scripts/load.js"></script>
</body>
</html>
